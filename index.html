<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Mobile Flip Album</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <h1>电子相册</h1>
        <p>拖动页角可半翻停住，也能随时回翻。</p>
      </header>

      <section class="album-shell">
        <div class="scene" id="scene">
          <div class="book" id="book"></div>
          <div class="gutter-shadow"></div>
        </div>
      </section>

      <footer class="controls">
        <button id="prevBtn" type="button" aria-label="Previous page">上一页</button>
        <span id="pageStatus">1 / 1</span>
        <button id="nextBtn" type="button" aria-label="Next page">下一页</button>
      </footer>
    </main>

    <audio id="pageFlipSound" preload="auto" src="assets/page-flip.mp3"></audio>
    <script src="app.js"></script>
  </body>
</html>
